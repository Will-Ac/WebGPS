<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon Candidate Preview</title>
    <style>
      body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(180deg,#d7ecff,#e9f8ef); }
      .wrap { padding: 20px; }
      h2 { margin: 16px 0 8px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit,minmax(180px,1fr)); gap: 14px; }
      .card { background: rgba(255,255,255,.9); border-radius: 12px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.12); }
      .label { font-size: 12px; color:#334; margin-top: 8px; }
      .btn { width: 56px; height: 56px; border-radius: 999px; background: rgba(255,255,255,.98); box-shadow: 0 2px 8px rgba(0,0,0,.22); display:flex; align-items:center; justify-content:center; }
      .btn.big { width:72px;height:72px; }
      .row { display:flex; gap:12px; align-items:center; }
      .icon { width:44px; height:44px; object-fit:contain; }
      .btn.big .icon { width:56px; height:56px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>SVG Icon Candidate Preview</h1>

      <h2>NORTH</h2>
      <div class="grid">
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/north/north-1.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/north/north-1.svg" /></div></div><div class="label">north-1.svg</div></div>
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/north/north-2.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/north/north-2.svg" /></div></div><div class="label">north-2.svg</div></div>
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/north/north-3.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/north/north-3.svg" /></div></div><div class="label">north-3.svg</div></div>
      </div>

      <h2>LOCATION</h2>
      <div class="grid">
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/location/location-1.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/location/location-1.svg" /></div></div><div class="label">location-1.svg</div></div>
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/location/location-2.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/location/location-2.svg" /></div></div><div class="label">location-2.svg</div></div>
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/location/location-3.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/location/location-3.svg" /></div></div><div class="label">location-3.svg</div></div>
      </div>

      <h2>COMPASS</h2>
      <div class="grid">
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/compass/compass-1.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/compass/compass-1.svg" /></div></div><div class="label">compass-1.svg</div></div>
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/compass/compass-2.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/compass/compass-2.svg" /></div></div><div class="label">compass-2.svg</div></div>
        <div class="card"><div class="row"><div class="btn"><img class="icon" src="assets/icons/candidates/compass/compass-3.svg" /></div><div class="btn big"><img class="icon" src="assets/icons/candidates/compass/compass-3.svg" /></div></div><div class="label">compass-3.svg</div></div>
      </div>
    </div>
  </body>
</html>
