<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WebGPS Telemetry Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="app-shell" aria-label="Map screen">
      <div id="version-badge" aria-label="Version badge">[PR6.1]</div>
      <div id="map" aria-label="Map view"></div>

      <div id="map-ios-controls" aria-label="Map controls">
        <button id="layers-button" class="map-ios-fab" type="button" aria-expanded="false" aria-controls="layers-dialog" aria-label="Map layers">
          <span class="map-ios-fab-icon">◫</span>
          <span class="map-ios-fab-text">Layers</span>
        </button>

        <button id="compass-reset-control" class="map-ios-fab" type="button" aria-label="Reset north-up">
          <span class="map-ios-fab-icon">N</span>
          <span class="map-ios-fab-text">North</span>
        </button>

        <button id="location-mode-button" class="map-ios-fab" type="button" aria-label="Location mode" data-mode="inactive">
          <span class="location-mode-icon" aria-hidden="true">⌖</span>
          <span class="location-mode-label">Locate</span>
        </button>
      </div>

      <section id="layers-dialog" aria-label="Map layer options" hidden>
        <h2>Map type</h2>
        <button class="layer-option" type="button" data-layer-key="streets">Streets</button>
        <button class="layer-option" type="button" data-layer-key="satellite">Satellite</button>
        <button class="layer-option" type="button" data-layer-key="terrain">Terrain</button>
      </section>

      <div id="north-compass-indicator" aria-label="North compass indicator">
        <span class="north-compass-arrow" aria-hidden="true">▲</span>
      </div>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="app.js"></script>
  </body>
</html>
